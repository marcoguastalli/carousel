server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Serve the manifest generated at startup (see 40-generate-manifest.sh),
    # not the placeholder baked into the image. Kept outside the mounted
    # images volume so that volume can be read-only.
    location = /images/manifest.json {
        alias /var/lib/carousel/manifest.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # Everything else (app shell + the mounted /images/* files).
    location / {
        try_files $uri $uri/ =404;
    }
}
